services:
  teamspeak:
    image: teamspeak:3.13
    container_name: ${TS3_CONTAINER_NAME}
    restart: always
    ports:
      - "${TS3_PORT_UDP}:9987/udp"
      - "${TS3_PORT_FILE}:30033"
    # Полное состояние сервера (БД, логи, licensekey.dat) — копируйте teamspeak-data на другой хост для переноса
    volumes:
      - ./teamspeak-data:/var/ts3server
    environment:
      TS3SERVER_LICENSE: ${TS3SERVER_LICENSE}
      TS3SERVER_LICENSEPATH: ${TS3SERVER_LICENSEPATH:-/var/ts3server}
      TS3SERVER_QUERY_PROTOCOLS: ""        # ServerQuery отключён (для базового использования не нужен)
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 30033 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 1g
    cpus: 1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"